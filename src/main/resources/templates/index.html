<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Movie Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Hero Header -->
<header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="marvel-logo">
            <span class="logo-m">M</span><span class="logo-rest">ARVEL</span>
        </div>
        <h1 class="hero-title">Каталог Фильмов</h1>
        <p class="hero-subtitle">Кинематографическая Вселенная Marvel</p>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <span class="stat-number" id="totalCount" th:text="${totalMovies}">0</span>
                <span class="stat-label">Всего</span>
            </div>
            <div class="stat-item stat-watched">
                <span class="stat-number" id="watchedCount" th:text="${watchedCount}">0</span>
                <span class="stat-label">Просмотрено</span>
            </div>
            <div class="stat-item stat-will-watch">
                <span class="stat-number" id="willWatchCount" th:text="${willWatchCount}">0</span>
                <span class="stat-label">Буду смотреть</span>
            </div>
            <div class="stat-item">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="stat-label">Прогресс</span>
            </div>
        </div>
    </div>
</header>

<!-- Filter Bar -->
<section class="filter-section">
    <div class="container">
        <div class="filter-bar">
            <div class="filter-group">
                <label class="filter-label">Фаза</label>
                <div class="filter-buttons" id="phaseFilter">
                    <button class="filter-btn active" data-phase="all">Все</button>
                    <button class="filter-btn" data-phase="1">Фаза 1</button>
                    <button class="filter-btn" data-phase="2">Фаза 2</button>
                    <button class="filter-btn" data-phase="3">Фаза 3</button>
                    <button class="filter-btn" data-phase="4">Фаза 4</button>
                    <button class="filter-btn" data-phase="5">Фаза 5</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">Статус</label>
                <div class="filter-buttons" id="statusFilter">
                    <button class="filter-btn active" data-status="all">Все</button>
                    <button class="filter-btn" data-status="WATCHED">✓ Просмотрено</button>
                    <button class="filter-btn" data-status="WILL_WATCH">★ Буду смотреть</button>
                    <button class="filter-btn" data-status="NOT_WATCHED">Не смотрел</button>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Movie Grid -->
<main class="container">
    <div class="movie-grid" id="movieGrid">
        <!-- Movies will be loaded via JS -->
    </div>
    <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">🎬</div>
        <p>Фильмы не найдены</p>
    </div>
</main>

<!-- Movie Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="movieModal">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-content">
            <div class="modal-poster">
                <img id="modalPoster" src="" alt="">
            </div>
            <div class="modal-info">
                <div class="modal-phase" id="modalPhase"></div>
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-meta">
                    <span class="modal-year" id="modalYear"></span>
                    <span class="modal-separator">•</span>
                    <span class="modal-duration" id="modalDuration"></span>
                    <span class="modal-separator">•</span>
                    <span class="modal-rating" id="modalRating"></span>
                </div>
                <p class="modal-description" id="modalDescription"></p>
                <div class="modal-actions" id="modalActions">
                    <!-- Status buttons rendered via JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p>Marvel Movie Catalog © 2026 — Все права защищены Marvel Studios</p>
    </div>
</footer>

<!-- Hidden data for JS -->
<script th:inline="javascript">
    window.INITIAL_MOVIES = /*[[${movies}]]*/ [];
</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
